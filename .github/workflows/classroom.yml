name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 Orb relik 2002 80 Rune kitab 1998 95 Aegis relik 1999 100"
          expected-output: |-
            Rune kitab 1998 95
            Aegis relik 1999 100
            Orb relik 2002 80
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - kategori beda urut alfabetis
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - kategori beda urut alfabetis
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 Zeta zoologi 2001 50 Alpha arkeologi 2010 40 Beta botani 2005 60 Gamma geologi 2000 55"
          expected-output: |-
            Alpha arkeologi 2010 40
            Beta botani 2005 60
            Gamma geologi 2000 55
            Zeta zoologi 2001 50
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - kategori sama tahun naik
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - kategori sama tahun naik
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 C relik 2005 70 A relik 1999 50 B relik 2002 60"
          expected-output: |-
            A relik 1999 50
            B relik 2002 60
            C relik 2005 70
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - kategori dan tahun sama nilai turun
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - kategori dan tahun sama nilai turun
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 A relik 2000 70 B relik 2000 90 C relik 2000 80"
          expected-output: |-
            B relik 2000 90
            C relik 2000 80
            A relik 2000 70
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - semua tie kecuali nama
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - semua tie kecuali nama
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3 Zeta relik 2000 90 Alpha relik 2000 90 Beta relik 2000 90"
          expected-output: |-
            Alpha relik 2000 90
            Beta relik 2000 90
            Zeta relik 2000 90
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - campuran lengkap
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - campuran lengkap
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "6 N1 geologi 2001 80 N2 arkeologi 2005 70 N3 geologi 2001 90 N4 arkeologi 2000 60 N5 botani 1999 50 N6 geologi 1998 40"
          expected-output: |-
            N4 arkeologi 2000 60
            N2 arkeologi 2005 70
            N5 botani 1999 50
            N6 geologi 1998 40
            N3 geologi 2001 90
            N1 geologi 2001 80
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - satu data
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - satu data
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1 Solo relik 2020 100"
          expected-output: "Solo relik 2020 100"
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - dua kategori dengan tie internal
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - dua kategori dengan tie internal
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 D batu 2001 50 B batu 2001 70 C logam 1999 40 A logam 1999 60"
          expected-output: |-
            B batu 2001 70
            D batu 2001 50
            A logam 1999 60
            C logam 1999 40
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - tahun beda jauh
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - tahun beda jauh
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "5 A relik 2010 50 B relik 1980 90 C relik 1990 80 D relik 2000 70 E relik 2020 60"
          expected-output: |-
            B relik 1980 90
            C relik 1990 80
            D relik 2000 70
            A relik 2010 50
            E relik 2020 60
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - kategori numerik nama artefak
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - kategori numerik nama artefak
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4 X1 relik 2000 10 X2 relik 2000 10 X0 relik 2000 10 X3 relik 2000 10"
          expected-output: |-
            X0 relik 2000 10
            X1 relik 2000 10
            X2 relik 2000 10
            X3 relik 2000 10
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
